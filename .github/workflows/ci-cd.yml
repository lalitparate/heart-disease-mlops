name: CI/CD Pipeline — Heart Disease MLOps

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: heart-disease-api

jobs:

  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Code Quality (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 src/ api/ tests/ \
            --max-line-length=120 \
            --ignore=E501,W503 \
            --exclude=__pycache__,.venv,mlruns

  # ── 2. Unit Tests ─────────────────────────────────────────────────────────
  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create models directory
        run: mkdir -p models

      - name: Generate synthetic dataset
        run: python data/download_data.py

      - name: Run pytest with coverage
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=src \
            --cov=api \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── 3. Train & Validate ───────────────────────────────────────────────────
  train:
    name: Model Training Smoke Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download / generate dataset
        run: python data/download_data.py

      - name: Train models
        run: python src/train.py

      - name: Verify model artifacts exist
        run: |
          test -f models/best_model.joblib    && echo "best_model.joblib OK"
          test -f models/preprocessor.joblib  && echo "preprocessor.joblib OK"

      - name: Upload trained model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: models/
          retention-days: 7

  # ── 4. Docker Build ───────────────────────────────────────────────────────
  docker:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: train
    steps:
      - uses: actions/checkout@v4

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: trained-models
          path: models/

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:ci .

      - name: Run container
        run: |
          docker run -d \
            --name test-container \
            -p 8000:8000 \
            ${{ env.IMAGE_NAME }}:ci
          sleep 8

      - name: Test health endpoint
        run: |
          curl -f http://localhost:8000/health \
            || (docker logs test-container && exit 1)

      - name: Test predict endpoint
        run: |
          curl -f -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{
              "age":52,"sex":1,"cp":0,"trestbps":125,
              "chol":212,"fbs":0,"restecg":1,"thalach":168,
              "exang":0,"oldpeak":1.0,"slope":2,"ca":2,"thal":3
            }' \
            || (docker logs test-container && exit 1)

      - name: Stop container
        if: always()
        run: docker rm -f test-container || true
